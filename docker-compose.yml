services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ide_builder
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/ide_builder
      JWT_SECRET: dev-secret-change-me
      CORS_ORIGINS: http://localhost:5173
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
    depends_on:
      - postgres
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
      VITE_DEMO_JWT: ${VITE_DEMO_JWT:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJkZW1vLXVzZXIifQ.LS_5LQP_cUfhgRhmew0kP2Exx98zTEhd7r4kUx9SMFI}
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  postgres_data:
